theme: 
  name: material
  palette:
    primary: white
    scheme: default
  font:
    text: Nanum Gothic
  language: kr
  logo: assets/images/favicon.png
  favicon: assets/images/favicon.ico

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.1.2/highlight.min.js
  - javascripts/config.js
  - https://cdn.jsdelivr.net/npm/katex@0.13.0/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.13.0/dist/contrib/auto-render.min.js

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.13.0/dist/katex.min.css
  # - https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.1.2/styles/github-gist.min.css
  - stylesheets/config.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ccss17

markdown_extensions:
  - toc:
      permalink: "&para;"
      baselevel: 2
      toc_depth: 2-4
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.critic
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - attr_list
  - def_list
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.magiclink
  - pymdownx.tasklist:
      clickable_checkbox: false
      custom_checkbox: true
